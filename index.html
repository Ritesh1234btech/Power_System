<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dispatch Pro — Economic Load Dispatch Analysis Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --bg:#F5F6F8; --panel:#fff; --line:#DCE1E8; --text:#16202A; --muted:#5B6B7C;
  --copper:#C1652B; --copper-soft:#F2E3D8; --teal:#0E8C82; --teal-soft:#E1F3F1;
  --danger:#C1402E; --navy:#1E3A5F; --purple:#7A5DC7; --gold:#D8A03D;
  --font-head:'IBM Plex Sans',sans-serif; --font-mono:'IBM Plex Mono',monospace;
  --shadow:0 1px 2px rgba(20,30,40,.04),0 4px 14px rgba(20,30,40,.05);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-head);}
.wrap{max-width:1400px;margin:0 auto;padding:28px 22px 100px;}
header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid var(--navy);padding-bottom:16px;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{width:36px;height:36px;background:var(--navy);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono);font-weight:700;font-size:15px;}
h1{font-size:20px;margin:0;font-weight:700;color:var(--navy);}
.subtitle{color:var(--muted);font-size:11.5px;font-family:var(--font-mono);margin-top:2px;}
.badges{display:flex;gap:6px;flex-wrap:wrap;}
.badge{font-family:var(--font-mono);font-size:10px;color:var(--teal);border:1px solid var(--teal);background:var(--teal-soft);padding:4px 9px;border-radius:20px;font-weight:600;}
.tabbar{display:flex;gap:3px;border-bottom:2px solid var(--line);margin-bottom:20px;flex-wrap:wrap;}
.tab{padding:9px 14px;font-family:var(--font-mono);font-size:11.5px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.active{color:var(--copper);border-bottom-color:var(--copper);font-weight:700;}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px;box-shadow:var(--shadow);margin-bottom:18px;}
.panel h2{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--navy);margin:0 0 14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.panel h2::before{content:'';width:13px;height:2.5px;background:var(--copper);}
.panel h3{font-size:12.5px;margin:16px 0 8px;color:var(--navy);}
.note{color:var(--muted);font-size:12px;line-height:1.6;margin:0 0 10px;}
label{display:block;font-size:10.5px;color:var(--muted);margin-bottom:4px;font-family:var(--font-mono);}
input[type=number],input[type=text],select{width:100%;background:#FBFCFD;border:1px solid var(--line);color:var(--text);padding:8px 9px;border-radius:6px;font-family:var(--font-mono);font-size:12.5px;}
input:focus,select:focus{border-color:var(--copper);outline:none;}
input:disabled{opacity:.4;background:#F0F1F3;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
@media(max-width:980px){.grid2,.grid3,.grid4{grid-template-columns:1fr;}}
button{font-family:var(--font-mono);font-size:11.5px;border-radius:6px;border:1px solid var(--line);cursor:pointer;padding:8px 13px;background:#fff;color:var(--text);}
button:hover{border-color:var(--copper);color:var(--copper);}
.btn-primary{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:600;width:100%;padding:11px;font-size:12.5px;}
.btn-primary:hover{background:#16304F;color:#fff;}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#fff;}
.btn-icon{padding:4px 8px;font-size:11px;}
.btn-danger:hover{border-color:var(--danger);color:var(--danger);}
table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:11.5px;}
th{text-align:left;color:var(--muted);font-weight:600;font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;padding:6px 7px;border-bottom:2px solid var(--line);}
td{padding:7px;border-bottom:1px solid var(--line);}
.gen-tag{color:var(--teal);font-weight:700;}
.empty-note{color:var(--muted);font-size:11.5px;font-family:var(--font-mono);padding:14px;text-align:center;border:1px dashed var(--line);border-radius:8px;}
.hidden{display:none!important;}
.uc-manual-cell{cursor:pointer;text-align:center;transition:background .2s,color .2s;padding:6px;border:1px solid var(--line);border-radius:4px;}
.uc-manual-cell.active{background:var(--copper-soft);color:var(--copper);font-weight:700;}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9.5px;font-family:var(--font-mono);}
.pill-ok{background:#E5F6ED;color:#1E8E5A;} .pill-warn{background:#FDEEEA;color:var(--danger);}
footer{margin-top:30px;text-align:center;color:var(--muted);font-family:var(--font-mono);font-size:10.5px;}
@media print{ .tabbar,button,.no-print{display:none!important;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="brand-mark">λ</div>
      <div><h1>Dispatch Pro</h1><div class="subtitle">economic load dispatch suite</div></div>
    </div>
    <button type="button" class="btn-gold no-print" onclick="exportReport()">⤓ Export report (PDF)</button>
  </header>

  <div class="tabbar">
    <div class="tab active" data-tab="unitcommitment" onclick="switchTab('unitcommitment')">5. Unit Commitment</div>
  </div>

  <div id="tab-unitcommitment" class="tab-panel">
    <div class="panel">
      <h2>Unit Commitment Overview</h2>
      <label class="toggle-row"><input type="checkbox" id="uc-manual-mode" onchange="toggleUCManualMode()"><span>Manual commitment mode</span></label>
      <div class="grid2">
        <div><label>Spinning reserve margin (%)</label><input type="number" id="uc-reserve-margin" value="10" step="any"></div>
        <div><label>Commitment load curve</label><input type="text" id="uc-loadcurve" value="210,205,200,198,205,220,260,310,360,400,420,430,425,415,395,375,355,380,405,385,340,300,260,230"></div>
      </div>
      <label class="toggle-row"><input type="checkbox" id="uc-force-two"><span>Force minimum 2 units online</span></label>
      <div style="margin-top:10px;"><button type="button" class="btn-primary" onclick="onRunUnitCommitment()">Run unit commitment dispatch →</button></div>
    </div>

    <div id="uc-empty" class="empty-note">Run the unit commitment dispatch to see the schedule.</div>
    <div id="uc-result" class="hidden">
      <div class="panel"><h2>Commitment Schedule</h2><div id="uc-schedule-table"></div></div>
    </div>
  </div>
</div>

<script>
let generators = [
  {a:0.0070,b:7.0,c:240, pmin:100,pmax:500, ppz:[[210,240],[350,380]], rampUp:80,rampDown:120, valveE:300,valveF:0.031,minUpTime:3,minDownTime:3,startupCost:1500},
  {a:0.0095,b:10.0,c:200, pmin:50, pmax:200, ppz:[[90,110],[140,160]], rampUp:50,rampDown:90, valveE:200,valveF:0.042,minUpTime:2,minDownTime:2,startupCost:1200},
  {a:0.0090,b:8.5,c:220, pmin:80, pmax:300, ppz:[[150,170],[210,240]], rampUp:65,rampDown:100, valveE:150,valveF:0.063,minUpTime:3,minDownTime:2,startupCost:1300},
  {a:0.0090,b:11.0,c:200, pmin:50, pmax:150, ppz:[[80,90],[110,120]], rampUp:50,rampDown:90, valveE:150,valveF:0.063,minUpTime:2,minDownTime:2,startupCost:1100},
  {a:0.0080,b:10.5,c:220, pmin:50, pmax:200, ppz:[[90,110],[140,150]], rampUp:50,rampDown:90, valveE:150,valveF:0.063,minUpTime:2,minDownTime:2,startupCost:1200},
  {a:0.0075,b:12.0,c:190, pmin:50, pmax:120, ppz:[[75,85],[100,105]], rampUp:50,rampDown:90, valveE:150,valveF:0.063,minUpTime:2,minDownTime:2,startupCost:1000}
];
let usingBenchmarkMatrix=false, lossesEnabled=false, valveEnabled=false;
let ucManualSchedule=null;
let currentUCSchedule=null;

function switchTab(){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.add('hidden'));
  document.getElementById('tab-unitcommitment').classList.remove('hidden');
}

function averageFullLoadCost(g){ return (g.a*g.pmax*g.pmax + g.b*g.pmax + g.c) / g.pmax; }
function baseCost(g,p){ return g.a*p*p + g.b*p + g.c; }
function unitCost(g,p){ return baseCost(g,p); }
function snapOutOfPPZ(g,p){ return p; }
function transmissionLoss(){ return 0; }

function solveLambdaSubset(gens, demand, indices){
  const n=gens.length;
  const pmin=gens.map(g=>g.pmin), pmax=gens.map(g=>g.pmax);
  const invA=gens.map(g=>1/(2*g.a));
  const sumInvA=invA.reduce((s,x)=>s+x,0);
  const sumBOverA=gens.reduce((s,g,i)=>s+g.b*invA[i],0);
  let lambda=(demand+sumBOverA)/sumInvA;
  let power=gens.map((g,i)=>Math.min(Math.max((lambda-g.b)/(2*g.a),pmin[i]),pmax[i]));
  let cost=power.map((p,i)=>unitCost(gens[i],p));
  return {ok:true, lambda, power, cost, loss:0, iterations:1, trace:[], totalCost:cost.reduce((a,b)=>a+b,0)};
}

function renderUCScheduleTable(status, demands){
  const headerCols = demands.map((_,h)=>`<th>H${h+1}</th>`).join('');
  const rows = generators.map((g,i)=>{
    const cols = demands.map((_,h)=>`<td>${status[h][i]?'ON':'OFF'}</td>`).join('');
    return `<tr><td class="gen-tag">G${i+1}</td>${cols}</tr>`;
  });
  return `<table><thead><tr><th>Gen</th>${headerCols}</tr></thead><tbody>${rows.join('')}</tbody></table>`;
}

function renderUCManualGrid(numHours){
  const grid=document.getElementById('uc-manual-grid');
  if(!grid) return;
  grid.innerHTML='';
}
function toggleUCManualMode(){}

function onRunUnitCommitment(){
  currentUCSchedule=null;
  const demands = document.getElementById('uc-loadcurve').value.split(',').map(s=>parseFloat(s.trim())).filter(x=>!isNaN(x));
  if(generators.length===0||demands.length===0){ alert('Add generators and load curve'); return; }
  const reserveMargin = parseFloat(document.getElementById('uc-reserve-margin').value) || 10;
  const forceMinTwo = document.getElementById('uc-force-two')?.checked || false;
  const manualMode = document.getElementById('uc-manual-mode')?.checked || false;

  if(manualMode){
    if(!ucManualSchedule || ucManualSchedule.length !== demands.length){
      ucManualSchedule = Array.from({length:demands.length},()=>new Array(generators.length).fill(false));
    }
  }

  const priority = generators.map((g,i)=>({i,avg:averageFullLoadCost(g)})).sort((a,b)=>a.avg-b.avg);
  const numHours=demands.length;
  const status = Array.from({length:numHours},()=>new Array(generators.length).fill(false));
  const dispatch = Array.from({length:numHours},()=>new Array(generators.length).fill(0));
  const hourlyCost = new Array(numHours).fill(0);

  let prevStatus = generators.map(()=>false); // OFF before hour 1
  let prevPower = generators.map(g=>g.pmin);

  for(let h=0; h<numHours; h++){
    const demand=demands[h];
    const target = demand*(1+reserveMargin/100);
    const forcedOn=new Set();
    const forcedOff=new Set();

    let committed = new Set();
    let committedPmax=0;
    let committedPmin=0;

    committed = new Set(forcedOn);
    committedPmax = [...committed].reduce((s,i)=>s+generators[i].pmax,0);
    committedPmin = [...committed].reduce((s,i)=>s+generators[i].pmin,0);

    for(const cand of priority){
      if(committed.has(cand.i) || forcedOff.has(cand.i)) continue;
      if(committedPmax >= target && committedPmin <= demand) break;
      const g=generators[cand.i];
      const nextPmin = committedPmin + g.pmin;
      if(committedPmax >= target && nextPmin > demand) break;
      committed.add(cand.i);
      committedPmax += g.pmax;
      committedPmin += g.pmin;
    }

    if(forceMinTwo && committed.size<2){
      for(const cand of priority){
        if(committed.has(cand.i)) continue;
        committed.add(cand.i);
        committedPmax += generators[cand.i].pmax;
        committedPmin += generators[cand.i].pmin;
        if(committed.size>=2) break;
      }
    }

    // ---- FIX #1: Set.reduce -> Set iteration ----
    let capSum=0;
    committed.forEach(i=>{ capSum += generators[i].pmax; });
    const infeasible = capSum < demand;
    if(infeasible){
      alert(`Infeasible at hour ${h+1}`);
      return;
    }

    const indices=[];
    const tempGens=[];
    committed.forEach(i=>{
      const g=generators[i];
      tempGens.push({...g,pmin:g.pmin,pmax:g.pmax});
      indices.push(i);
    });

    const result = solveLambdaSubset(tempGens, demand, indices);
    if(!result.ok){ alert('UC dispatch failed'); return; }

    // ---- FIX #2: startup only on OFF->ON transition ----
    let startup = 0;
    indices.forEach(i=>{
      const wasOn = prevStatus[i] === true;
      if(!wasOn){ startup += generators[i].startupCost || 0; }
    });

    indices.forEach((i,j)=>{
      status[h][i]=true;
      dispatch[h][i]=result.power[j];
      prevPower[i]=result.power[j];
    });

    // update prevStatus snapshot for next hour
    prevStatus = status[h].slice();

    hourlyCost[h] = result.totalCost + startup;
  }

  currentUCSchedule={status,dispatch,demands,hourlyCost};
  document.getElementById('uc-empty').classList.add('hidden');
  document.getElementById('uc-result').classList.remove('hidden');
  document.getElementById('uc-schedule-table').innerHTML = renderUCScheduleTable(status, demands);
}

function exportReport(){ alert('PDF export not included in this minimal reproduction.'); }
renderUCManualGrid();
</script>
</body>
</html>
